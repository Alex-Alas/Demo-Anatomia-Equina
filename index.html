<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo: Anatomía del Caballo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading">
  <div class="loading-logo">Demo: <span>Anatomía Equina</span></div>
  <div class="loading-sub">Anatomía Veterinaria · Demo</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="load-bar"></div></div>
  <div class="loading-status" id="load-status">Iniciando escena…</div>
</div>

<header>
  <div class="logo">Demo: <span>Anatomía Equina</span></div>
  <div class="header-right">DEMO TECNOLÓGICA<br><span style="color:var(--accent)">v0.2.0</span></div>
</header>

<div id="canvas-container"></div>
<div id="hotspots-layer" style="position:fixed;inset:0;pointer-events:none;z-index:50;"></div>

<div id="panel">
  <button class="panel-close" id="panel-close">✕</button>
  <div class="panel-header">
    <div class="panel-category" id="panel-cat">Sistema</div>
    <div class="panel-title" id="panel-title">Cabeza</div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div id="hud">
  <span>↺</span> Arrastrar para rotar &nbsp;|&nbsp;
  <span>⊕</span> Scroll para zoom &nbsp;|&nbsp;
  <span>●</span> Click en puntos para info
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot"></div>Estructura</div>
  <div class="legend-item"><div class="legend-dot system"></div>Sistema</div>
  <div class="legend-item"><div class="legend-dot vital"></div>Vital</div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Main Script -->
<script type="module" src="script.js"></script>
</body>
</html>
