<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo: Anatomía del Caballo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f0e;
    --surface: #141715;
    --border: #2a2e2b;
    --accent: #c8a96e;
    --accent2: #7eb89a;
    --text: #e8e4dc;
    --muted: #7a8078;
    --danger: #d4735a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    background: linear-gradient(to bottom, rgba(13,15,14,0.98), transparent);
    pointer-events: none;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    color: var(--accent);
    pointer-events: all;
  }
  .logo span { color: var(--text); font-style: italic; }
  .header-right {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    pointer-events: all;
    line-height: 1.6;
  }

  #canvas-container {
    position: fixed; inset: 0;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  .hotspot {
    position: absolute;
    width: 16px; height: 16px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 50;
    pointer-events: all;
  }
  .hotspot-inner {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 0 0 rgba(200,169,110,0.6);
    animation: pulse 2.2s ease-out infinite;
    transition: transform 0.2s;
  }
  .hotspot:hover .hotspot-inner { transform: scale(1.4); background: #fff; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(200,169,110,0.7); }
    70%  { box-shadow: 0 0 0 10px rgba(200,169,110,0); }
    100% { box-shadow: 0 0 0 0 rgba(200,169,110,0); }
  }
  .hotspot-label {
    position: absolute;
    left: 22px; top: 50%;
    transform: translateY(-50%);
    background: rgba(13,15,14,0.85);
    border: 1px solid var(--border);
    padding: 3px 8px;
    font-size: 0.6rem;
    white-space: nowrap;
    color: var(--text);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .hotspot:hover .hotspot-label { opacity: 1; }

  #panel {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 380px;
    background: rgba(20,23,21,0.97);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(16px);
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    z-index: 200;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #panel.open { transform: translateX(0); }
  .panel-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-category {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    line-height: 1.1;
    color: var(--text);
  }
  .panel-close {
    position: absolute; top: 20px; right: 20px;
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .panel-close:hover { color: var(--text); border-color: var(--accent); }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .panel-section { margin-bottom: 28px; }
  .panel-section h3 {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section p { font-size: 0.75rem; line-height: 1.8; color: #b8b4ac; }
  .fact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .fact-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 12px;
  }
  .fact-label { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .fact-value { font-size: 0.72rem; color: var(--text); font-weight: 700; }
  .sub-parts { display: flex; flex-wrap: wrap; gap: 6px; }
  .sub-part {
    padding: 4px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 0.62rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.06em;
  }
  .sub-part:hover { border-color: var(--accent); color: var(--accent); }

  #hud {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center;
    background: rgba(20,23,21,0.9);
    border: 1px solid var(--border);
    padding: 10px 20px;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    z-index: 100;
    pointer-events: none;
  }
  #hud span { color: var(--accent); }

  #legend {
    position: fixed; left: 28px; bottom: 28px;
    z-index: 100;
    display: flex; flex-direction: column; gap: 6px;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 1.5px solid rgba(255,255,255,0.4); flex-shrink: 0; }
  .legend-dot.system { background: var(--accent2); }
  .legend-dot.vital  { background: var(--danger); }

  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--accent); margin-bottom: 8px; }
  .loading-sub { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 36px; }
  .loading-bar-wrap { width: 200px; height: 2px; background: var(--border); overflow: hidden; }
  .loading-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
  .loading-status { margin-top: 12px; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--muted); }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">Demo: <span>Anatomía Equina</span></div>
  <div class="loading-sub">Anatomía Veterinaria · Demo</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="load-bar"></div></div>
  <div class="loading-status" id="load-status">Iniciando escena…</div>
</div>

<header>
  <div class="logo">Demo: <span>Anatomía Equina</span></div>
  <div class="header-right">DEMO TECNOLÓGICA<br><span style="color:var(--accent)">v0.1.0</span></div>
</header>

<div id="canvas-container"></div>
<div id="hotspots-layer" style="position:fixed;inset:0;pointer-events:none;z-index:50;"></div>

<div id="panel">
  <button class="panel-close" id="panel-close">✕</button>
  <div class="panel-header">
    <div class="panel-category" id="panel-cat">Sistema</div>
    <div class="panel-title" id="panel-title">Cabeza</div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div id="hud">
  <span>↺</span> Arrastrar para rotar &nbsp;|&nbsp;
  <span>⊕</span> Scroll para zoom &nbsp;|&nbsp;
  <span>●</span> Click en puntos para info
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot"></div>Estructura</div>
  <div class="legend-item"><div class="legend-dot system"></div>Sistema</div>
  <div class="legend-item"><div class="legend-dot vital"></div>Vital</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── ANATOMY DATA ─────────────────────────────────────────────────────────
const ANATOMY = {

    label: "Dorso / Lomo", category: "Columna Torácica–Lumbar", type: "structure",
    description: "Región que comprende las vértebras torácicas (T1–T18) y lumbares (L1–L6). Es la zona de transmisión de fuerzas entre cuartos traseros y delanteros durante el movimiento.",
    facts: [{ label:"Vértebras T", value:"18 torácicas" },{ label:"Vértebras L", value:"6 lumbares" },{ label:"Costillas", value:"18 pares" },{ label:"Long. aprox.", value:"~130–150 cm" }],
    subparts: ["Apófisis espinosas","Costillas","Disco intervertebral","Músc. longísimo","Aorta dorsal"],

  cuartoTrasero: {
    label: "Cuarto Trasero", category: "Aparato Locomotor", type: "structure",
    description: "El cuarto trasero genera la mayor parte de la propulsión en el movimiento equino. Incluye la pelvis, el fémur, tibia y la compleja articulación del corvejón.",
    facts: [{ label:"Músc. glúteo", value:"~15 kg c/u" },{ label:"Articulaciones", value:"Cadera, Rodilla, Corvejón" },{ label:"Fuerza impulso", value:"mayor propulsor" },{ label:"Hueso fémur", value:"~43 cm long." }],
    subparts: ["Pelvis / Ilion","Fémur","Tibia / Peroné","Corvejón (Tarso)","Metatarso","Menudillo","Casco"],
    clinical: "La enfermedad del corvejón (esparaván óseo) y la ruptura del ligamento plantar son patologías frecuentes en caballos de deporte."
  },
  pataDelantera: {
    label: "Extremidad Delantera", category: "Aparato Locomotor", type: "structure",
    description: "Las extremidades delanteras soportan ~60% del peso corporal. La escápula flota sobre la pared torácica sin articulación ósea con el tronco, absorbiendo impactos.",
    facts: [{ label:"Peso soportado", value:"~60% corporal" },{ label:"Articulaciones", value:"Hombro, Codo, Rodilla" },{ label:"Metacarpo", value:"Caña + 2 huesos pequeños" },{ label:"Casco", value:"~500 g peso" }],

  casco: {
    label: "Casco", category: "Órgano Digital", type: "vital",
    description: "El casco es una estructura de queratina que protege y amortigua las estructuras digitales. 'No hay casco, no hay caballo' — su integridad es fundamental para la locomoción.",
    facts: [{ label:"Material", value:"Queratina" },{ label:"Crec. mensual", value:"~1 cm/mes" },{ label:"Herraje", value:"c/ 6–8 semanas" },{ label:"Temp. normal", value:"<32°C" }],

};

// ─── HOTSPOT FRACTIONS ────────────────────────────────────────────────────
// [fracX, fracY, fracZ] — normalized 0..1 over bounding box axes.
// Calibrated for a horse model facing +X, standing on Y=0.
const HOTSPOT_FRACS = [
  { id: "cabeza", frac: [0.65, 0.87, 0.91], key: "cabeza" },
  { id: "cuello", frac: [0.43, 0.66, 0.78], key: "cuello" },
  { id: "partemediadeltorso", frac: [0.12, 0.56, 0.45], key: "abdomen" },
  { id: "partetraseradelcaballo", frac: [0.02, 0.59, 0.20], key: "cuartoTrasero" },
  { id: "partedelanteradeltorso", frac: [0.10, 0.58, 0.68], key: "pecho" },
  { id: "partemediadelaspiernastraseras", frac: [0.22, 0.26, 0.11], key: "cuartoTrasero" },
  { id: "partemediadelaspiernasdelanteras", frac: [0.28, 0.23, 0.66], key: "pataDelantera" },
];
const HOTSPOTS_3D = HOTSPOT_FRACS.map(h => ({ ...h, pos: new THREE.Vector3() }));

function fitHotspots(box) {
  const size = new THREE.Vector3();
  box.getSize(size);
  HOTSPOT_FRACS.forEach((hf, i) => {
    HOTSPOTS_3D[i].pos.set(
      box.min.x + hf.frac[0] * size.x,
      box.min.y + hf.frac[1] * size.y,
      box.min.z + hf.frac[2] * size.z
    );
  });
}

// ─── RENDERER ─────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0f0e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.7);
hemiLight.position.set(0, 50, 0);
scene.add(hemiLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
keyLight.position.set(5, 5, 10);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 1.2);
fillLight.position.set(-5, 5, 5);
scene.add(fillLight);

const backLight = new THREE.DirectionalLight(0xffffff, 1.0);
backLight.position.set(0, 5, -10);
scene.add(backLight);

const bottomLight = new THREE.DirectionalLight(0xffffff, 0.7);
bottomLight.position.set(0, -10, 0); // Light from below
scene.add(bottomLight);

// Ground & grid (rescaled after model load)
const gridHelper = new THREE.GridHelper(20, 30, 0x2a2e2b, 0x1e2220);
scene.add(gridHelper);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0x111411, roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ─── ORBIT ────────────────────────────────────────────────────────────────
let isDragging = false, prevX = 0, prevY = 0;
let sph = { theta: Math.PI / 4, phi: Math.PI / 3, r: 5 };
const target = new THREE.Vector3();

function updateCamera() {
  camera.position.set(
    target.x + sph.r * Math.sin(sph.phi) * Math.sin(sph.theta),
    target.y + sph.r * -Math.cos(sph.phi),
    target.z + sph.r * Math.sin(sph.phi) * Math.cos(sph.theta)
  );
  camera.lookAt(target);
}
updateCamera();

// --- HOTSPOT CAPTURE TOOL ---
let horseModel = null;
let modelBox = new THREE.Box3();
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hasMoved = false;

container.addEventListener('mousedown', e => { 
  isDragging = true; 
  hasMoved = false;
  prevX = e.clientX; 
  prevY = e.clientY; 
});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  hasMoved = true;
  sph.theta -= (e.clientX - prevX) * 0.006;
  sph.phi = Math.max(0.1, Math.min(Math.PI - 0.1, sph.phi + (e.clientY - prevY) * 0.006));
  prevX = e.clientX; prevY = e.clientY;
  updateCamera();
});

container.addEventListener('click', e => {
  if (hasMoved || !horseModel) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(horseModel, true);
  if (intersects.length > 0) {
    const p = intersects[0].point;

    // Calculate normalized fractions relative to bounding box
    const fx = (p.x - modelBox.min.x) / size.x;
    const fy = (p.y - modelBox.min.y) / size.y;
    const fz = (p.z - modelBox.min.z) / size.z;
    
    const name = prompt("Nombre de la parte anatómica (ej: Corazón):");
    if (name) {
      const id = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');
      const code = `{ id: "${id}", frac: [${fx.toFixed(2)}, ${fy.toFixed(2)}, ${fz.toFixed(2)}], key: "${id}" },`;
      console.log("%c NUEVO HOTSPOT GENERADO ", "background: #c8a96e; color: #000; font-weight: bold;");
      console.log(code);
      alert(`Punto capturado: ${name}\n\nCódigo generado en consola:\n${code}`);
    }
  }
});
*/
container.addEventListener('wheel', e => {
  sph.r = Math.max(0.5, Math.min(200, sph.r + e.deltaY * 0.02));
  updateCamera();
}, { passive: true });
let lastTouch = null;
container.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
container.addEventListener('touchmove', e => {
  if (!lastTouch) return;
  const t = e.touches[0];
  sph.theta -= (t.clientX - lastTouch.clientX) * 0.008;
  sph.phi = Math.max(0.1, Math.min(Math.PI - 0.1, sph.phi + (t.clientY - lastTouch.clientY) * 0.008));
  lastTouch = t; updateCamera();
}, { passive: true });

// ─── HOTSPOT DOM ──────────────────────────────────────────────────────────
const hotspotsLayer = document.getElementById('hotspots-layer');
const hotspotEls = {};
HOTSPOTS_3D.forEach(hs => {
  const div = document.createElement('div');
  div.className = 'hotspot';
  div.innerHTML = `<div class="hotspot-inner"></div><div class="hotspot-label">${ANATOMY[hs.key].label}</div>`;
  div.style.pointerEvents = 'all';
  div.addEventListener('click', () => openPanel(hs.key));
  hotspotsLayer.appendChild(div);
  hotspotEls[hs.id] = div;
});

function projectHotspots() {
  const w = window.innerWidth, h = window.innerHeight;
  HOTSPOTS_3D.forEach(hs => {
    const el = hotspotEls[hs.id];
    const v = hs.pos.clone().project(camera);
    el.style.left = ((v.x * 0.5 + 0.5) * w) + 'px';
    el.style.top  = ((v.y * -0.5 + 0.5) * h) + 'px';
    el.style.display = v.z > 1 ? 'none' : 'block';
  });
}

// ─── PANEL ────────────────────────────────────────────────────────────────
const panel = document.getElementById('panel');
document.getElementById('panel-close').addEventListener('click', () => panel.classList.remove('open'));

function openPanel(key) {
  const d = ANATOMY[key];
  document.getElementById('panel-cat').textContent = d.category;
  document.getElementById('panel-title').textContent = d.label;
  document.getElementById('panel-body').innerHTML = `
    <div class="panel-section"><h3>Descripción</h3><p>${d.description}</p></div>
    <div class="panel-section"><h3>Datos Clave</h3>
      <div class="fact-grid">${d.facts.map(f=>`<div class="fact-item"><div class="fact-label">${f.label}</div><div class="fact-value">${f.value}</div></div>`).join('')}</div>
    </div>
    <div class="panel-section"><h3>Sub-estructuras</h3>
      <div class="sub-parts">${d.subparts.map(s=>`<div class="sub-part">${s}</div>`).join('')}</div>
    </div>
    <div class="panel-section"><h3>Relevancia Clínica</h3><p>${d.clinical}</p></div>
  `;
  panel.classList.add('open');
}

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ─── RENDER LOOP ──────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (!isDragging) { sph.theta += 0.0008; updateCamera(); }
  renderer.render(scene, camera);
  projectHotspots();
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('load-bar').style.width = pct + '%';
  document.getElementById('load-status').textContent = msg;
}

// ─── LOAD GLTFLoader THEN MODEL ───────────────────────────────────────────
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

setProgress(10, "Cargando bibliotecas 3D…");

loadScript('https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js')
  .then(() => {
    setProgress(25, "Cargando caballo.glb…");

    const loader = new THREE.GLTFLoader();

    // Attach DracoLoader if the model uses compression
    loadScript('https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js')
      .then(() => {
        try {
          const draco = new THREE.DRACOLoader();
          draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
          loader.setDRACOLoader(draco);
        } catch(e) {}
      }).catch(() => {});

    loader.load(
      'caballo.glb',

      // ── onLoad ──────────────────────────────────────────────────────────
      (gltf) => {
        setProgress(85, "Ajustando escena…");

        const model = gltf.scene;
        model.traverse(child => {
          if (child.isMesh && child.material) {
            if (child.material.map) child.material.map.encoding = THREE.sRGBEncoding;
            // Removed aggressive emissive override to restore original colors
          }
        });
        scene.add(model);

        // Auto-center: move model so its center is at world origin, floor at Y=0
        const box1 = new THREE.Box3().setFromObject(model);
        const center1 = new THREE.Vector3();
        box1.getCenter(center1);
        const size1 = new THREE.Vector3();
        box1.getSize(size1);

        model.position.set(-center1.x, -box1.min.y, -center1.z);

        // Recalculate after repositioning
        const box = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);

        // Reposition ground and grid to floor level
        const floorY = box.min.y - 0.002;
        ground.position.y = floorY;
        gridHelper.position.y = floorY;

        // Scale ground/grid to model footprint
        const footprint = Math.max(size.x, size.z) * 2.5;
        ground.scale.set(footprint / 20, 1, footprint / 20);
        gridHelper.scale.set(footprint / 20, 1, footprint / 20);

        // Update fog range
        const diag = size.length();
        scene.fog = new THREE.Fog(0x0d0f0e, diag * 3, diag * 8);

        // Fit camera
        target.copy(center);
        sph.r = diag * 1.2;
        camera.near = diag * 0.001;
        camera.far  = diag * 30;
        camera.updateProjectionMatrix();
        updateCamera();

        keyLight.position.set(diag * 1.2, diag * 2, diag);
        fillLight.position.set(-diag, diag, diag);
        backLight.position.set(0, diag, -diag);
        bottomLight.position.set(0, -diag, 0);

        // Map hotspot fractions → world positions
        horseModel = model;
        modelBox.copy(box);
        fitHotspots(box);

        setProgress(100, "Listo.");
        setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
        animate();
      },

      // ── onProgress ──────────────────────────────────────────────────────
      (xhr) => {
        if (xhr.total) {
          const pct = 25 + Math.round((xhr.loaded / xhr.total) * 58);
          setProgress(pct, `Cargando… ${Math.round(xhr.loaded / 1024)} KB`);
        }
      },

      // ── onError ─────────────────────────────────────────────────────────
      (err) => {
        console.error('Error cargando caballo.glb:', err);
        document.getElementById('load-status').textContent = '✕ No se pudo cargar caballo.glb — verifica que el archivo esté en la raíz del proyecto.';
        document.getElementById('load-status').style.color = '#d4735a';
      }
    );
  })
  .catch(err => {
    console.error('Error cargando GLTFLoader:', err);
    document.getElementById('load-status').textContent = '✕ Error al cargar bibliotecas 3D.';
    document.getElementById('load-status').style.color = '#d4735a';
  });
</script>
</body>
